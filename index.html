<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소다민지 가든 (Soda Minji Garden)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #f0e4d7;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            user-select: none;
            font-size: 13px;
        }

        .room-wall {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #fdfcf0, #e2d1c3);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .window-frame {
            position: relative;
            width: 90vw;
            max-width: 800px;
            height: 60vh;
            background: #aed9e0; 
            border: 15px solid #ffffff;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.1), 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .window-grid {
            position: absolute;
            top: 0; left: 50%; width: 4px; height: 100%; background: rgba(255,255,255,0.3); transform: translateX(-50%);
            z-index: 1;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.6;
            animation: moveCloud linear infinite;
            z-index: 0;
        }

        @keyframes moveCloud {
            from { left: -120px; }
            to { left: 110%; }
        }

        .window-sill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35px;
            background: #ffffff;
            z-index: 2;
        }

        .garden-area {
            position: absolute;
            bottom: 35px;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 0 20px;
            z-index: 10;
        }

        .plant-container {
            position: relative;
            margin: 0 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .plant-name {
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-bottom: 5px;
            z-index: 20;
        }

        .main-plant-visual {
            margin-bottom: -10px;
            z-index: 11;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80px;
        }

        .pot-svg {
            width: 75px;
            height: auto;
        }

        .decor-item {
            position: absolute;
            cursor: move;
            z-index: 50;
            font-size: 40px;
            touch-action: none;
        }

        .minigame-obj {
            position: absolute;
            cursor: pointer;
            z-index: 60;
            transition: transform 0.2s;
        }

        .bug { animation: bugWiggle 0.5s infinite; font-size: 24px; }
        @keyframes bugWiggle {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            50% { transform: translate(2px, -2px) rotate(10deg); }
        }

        .raindrop { animation: fall 3s linear forwards; font-size: 20px; }
        @keyframes fall {
            from { transform: translateY(-50px); opacity: 1; }
            to { transform: translateY(60vh); opacity: 0.5; }
        }

        .dead-leaf { font-size: 22px; filter: sepia(1) saturate(2); }
